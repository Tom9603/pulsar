<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulsar</title>
    <style>
      /* Écran de chargement affiché immédiatement, avant même React (web et desktop). */
      #pulsar-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(900px 600px at 50% 32%, rgba(139, 92, 246, 0.14), transparent 60%),
          #060609;
        transition: opacity 0.45s ease;
      }
      #pulsar-splash.is-hiding { opacity: 0; pointer-events: none; }
      .psl { display: flex; flex-direction: column; align-items: center; gap: 22px; }
      .psl .psl-mark { width: 100px; height: 100px; object-fit: contain; display: block; animation: psl-pulse 1.7s ease-in-out infinite; }
      @keyframes psl-pulse { 0%, 100% { transform: scale(0.95); opacity: 0.82; } 50% { transform: scale(1.01); opacity: 1; } }
      .psl .psl-word {
        font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
        letter-spacing: 0.34em;
        font-size: 14px;
        font-weight: 600;
        color: #cbd2e0;
        padding-left: 0.34em;
      }
      .psl .psl-bar {
        width: 132px;
        height: 3px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .psl .psl-bar i {
        display: block;
        height: 100%;
        width: 42%;
        border-radius: 3px;
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        animation: psl-slide 1.25s ease-in-out infinite;
      }
      @keyframes psl-slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(340%); } }
      @media (prefers-reduced-motion: reduce) {
        .psl .psl-mark, .psl .psl-bar i { animation: none; }
      }
    </style>
  </head>
  <body>
    <script>
      // Applique le thème choisi avant l'affichage (évite un clignotement).
      try {
        var a = JSON.parse(localStorage.getItem('pulsar-appearance') || '{}');
        var t = a.theme || 'dark';
        if (t === 'system') t = (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
        var r = document.documentElement;
        r.setAttribute('data-theme', t);
        r.setAttribute('data-density', a.density || 'cozy');
        r.style.zoom = ({ petit: 0.92, normal: 1, grand: 1.12 })[a.textSize] || 1;
      } catch (e) { /* stockage indisponible */ }
    </script>
