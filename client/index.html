<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulsar</title>
    <style>
      /* Écran de chargement affiché immédiatement, avant même React (web et desktop). */
      #pulsar-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(900px 600px at 50% 32%, rgba(139, 92, 246, 0.14), transparent 60%),
          #060609;
        transition: opacity 0.45s ease;
      }
      #pulsar-splash.is-hiding { opacity: 0; pointer-events: none; }
      .psl { display: flex; flex-direction: column; align-items: center; gap: 22px; }
      .psl svg { width: 96px; height: 96px; overflow: visible; }
      .psl .psl-wave { transform-origin: 61px 55px; animation: psl-wave 1.7s ease-in-out infinite both; }
      .psl .psl-w2 { animation-delay: 0.18s; }
      .psl .psl-w3 { animation-delay: 0.36s; }
      @keyframes psl-wave { 0%, 100% { opacity: calc(var(--o) * 0.22); } 45% { opacity: var(--o); } }
      .psl .psl-word {
        font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
        letter-spacing: 0.34em;
        font-size: 14px;
        font-weight: 600;
        color: #cbd2e0;
        padding-left: 0.34em;
      }
      .psl .psl-bar {
        width: 132px;
        height: 3px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .psl .psl-bar i {
        display: block;
        height: 100%;
        width: 42%;
        border-radius: 3px;
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        animation: psl-slide 1.25s ease-in-out infinite;
      }
      @keyframes psl-slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(340%); } }
      @media (prefers-reduced-motion: reduce) {
        .psl .psl-wave, .psl .psl-bar i { animation: none; }
        .psl .psl-wave { opacity: var(--o); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="pulsar-splash">
      <div class="psl">
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <defs>
            <linearGradient id="psl-bowl" x1="0.2" y1="0" x2="0.85" y2="1">
              <stop offset="0%" stop-color="#b478ef" />
              <stop offset="50%" stop-color="#7d5cec" />
              <stop offset="100%" stop-color="#4f83f5" />
            </linearGradient>
            <linearGradient id="psl-stem" x1="0.2" y1="0" x2="0.7" y2="1">
              <stop offset="0%" stop-color="#cda6f6" />
              <stop offset="55%" stop-color="#9a8bf3" />
              <stop offset="100%" stop-color="#6f92f7" />
            </linearGradient>
            <linearGradient id="psl-wave-grad" gradientUnits="userSpaceOnUse" x1="0" y1="18" x2="0" y2="96">
              <stop offset="0" stop-color="#c4a5f5" stop-opacity="0" />
              <stop offset="0.28" stop-color="#c4a5f5" stop-opacity="1" />
              <stop offset="0.72" stop-color="#9db4f7" stop-opacity="1" />
              <stop offset="1" stop-color="#9db4f7" stop-opacity="0" />
            </linearGradient>
            <filter id="psl-stem-shadow" x="-40%" y="-40%" width="190%" height="190%">
              <feDropShadow dx="1.7" dy="1.3" stdDeviation="1.5" flood-color="#170e2c" flood-opacity="0.5" />
            </filter>
          </defs>
          <g fill="none" stroke="url(#psl-wave-grad)" stroke-linecap="round">
            <path class="psl-wave psl-w1" style="--o:1" stroke-width="1.8" d="M 79.64 29.78 A 29 29 0 0 1 71.86 78.89" />
            <path class="psl-wave psl-w2" style="--o:.72" stroke-width="1.8" d="M 83.50 25.19 A 35 35 0 0 1 74.11 84.45" />
            <path class="psl-wave psl-w3" style="--o:.48" stroke-width="1.7" d="M 87.35 20.59 A 41 41 0 0 1 76.36 90.01" />
            <path class="psl-wave psl-w1" style="--o:1" stroke-width="1.8" d="M 35.89 66.50 A 29 29 0 0 1 53.01 24.12" />
            <path class="psl-wave psl-w2" style="--o:.72" stroke-width="1.8" d="M 30.69 69.50 A 35 35 0 0 1 51.35 18.36" />
            <path class="psl-wave psl-w3" style="--o:.48" stroke-width="1.7" d="M 25.49 72.50 A 41 41 0 0 1 49.70 12.59" />
          </g>
          <path d="M 50 31 L 71 31 A 18.5 18.5 0 0 1 71 68 L 50 68 Z" fill="url(#psl-bowl)" />
          <rect x="44" y="31" width="15" height="58" rx="7.5" fill="url(#psl-stem)" filter="url(#psl-stem-shadow)" />
        </svg>
        <span class="psl-word">PULSAR</span>
        <span class="psl-bar"><i></i></span>
      </div>
    </div>

    <script>
      // Retire le splash une fois l'application prête (appelé depuis React).
      window.__hidePulsarSplash = function () {
        var el = document.getElementById('pulsar-splash');
        if (!el || el.classList.contains('is-hiding')) return;
        el.classList.add('is-hiding');
        setTimeout(function () { el.remove(); }, 500);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
