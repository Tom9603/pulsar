name: Publier une version

# Se déclenche quand tu pousses un tag de version, ex. v0.1.1
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    # Autorise le jeton automatique à créer la Release et y déposer les fichiers.
    permissions:
      contents: write

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer les dépendances
        run: |
          npm install
          npm --prefix client install

      - name: Compiler le client
        run: npm --prefix client run build

      - name: Construire et publier l'app desktop
        env:
          # Fourni automatiquement par GitHub Actions — permet de publier la version.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
