appId: com.pulsar.app
productName: Pulsar
copyright: © 2026 Pulsar

directories:
  output: desktop/release
  buildResources: desktop/build

# Fichiers embarqués dans l'app (le client compilé + le code Electron).
# Le serveur backend n'est PAS inclus : il tourne séparément (hébergé/host).
files:
  - desktop/main.js
  - desktop/preload.js
  - client/dist/**/*
  - package.json

extraMetadata:
  main: desktop/main.js

# Où publier les versions pour la mise à jour automatique.
publish:
  provider: github
  owner: Tom9603
  repo: concord

win:
  target: [nsis]
  artifactName: ${productName}-${version}-Setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  target: [dmg]
  category: public.app-category.social
  identity: null # pas de signature (version de test)
  # Indispensable : sans ces descriptions, macOS refuse/plante l'accès micro & caméra.
  extendInfo:
    NSMicrophoneUsageDescription: Pulsar utilise ton microphone pour les salons vocaux.
    NSCameraUsageDescription: Pulsar peut utiliser ta caméra pour la vidéo.

linux:
  target: [AppImage]
  category: Network
